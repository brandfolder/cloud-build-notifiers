steps:
  # GoKart (praetorian-inc/gokart) is archived and pins golang.org/x/tools@v0.1.12,
  # which panics on Go 1.24 export data ("unsupported version: 2"). gosec covers SAST.
  - name: securego/gosec
    args:  ['./...']
    waitFor: ['-']

  - id: gofmt
    name: golang:1.24
    entrypoint: 'sh'
    args:
     - -c 
     - |
       gofmt -s -d . && test -z $(gofmt -s -d .)
    waitFor: ['-']
