steps:
  - id: gokart
    name: golang:1.24
    entrypoint: 'bash'
    args:
     - -c
     - |
       go install github.com/praetorian-inc/gokart@latest
       gokart scan ./
    waitFor: ['-']

  - name: securego/gosec
    args:  ['./...']
    waitFor: ['-']

  - id: gofmt
    name: golang:1.24
    entrypoint: 'sh'
    args:
     - -c 
     - |
       gofmt -s -d . && test -z $(gofmt -s -d .)
    waitFor: ['-']
